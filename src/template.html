<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
  <meta name="referrer" content="no-referrer">
  <meta name="color-scheme" content="light">
  <title>A birthday story</title>
  <style>
    :root {
      --accent: #b74b67;
      --paper: #fff9f5;
      --ink: #30272a;
      --serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      max-width: 100%;
      overflow-x: clip;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 25rem),
        radial-gradient(circle at 95% 30%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 28rem),
        var(--paper);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E");
    }

    .home {
      position: relative;
      min-height: 100svh;
      display: grid;
      align-items: center;
      overflow: clip;
    }

    .home::after {
      content: "";
      position: absolute;
      right: -11rem;
      top: 8%;
      width: 31rem;
      height: 31rem;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      border-radius: 45% 55% 62% 38%;
      transform: rotate(20deg);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 2.5rem));
      margin-inline: auto;
    }

    h1 {
      max-width: 13ch;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(3.6rem, 9vw, 8.2rem);
      font-weight: 400;
      letter-spacing: -0.065em;
      line-height: 0.88;
    }

    ::selection {
      color: white;
      background: var(--accent);
    }

    @media (max-width: 820px) {
      .home::after { opacity: 0.45; }
      h1 { max-width: 9ch; }
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 1.4rem, 1120px); }
      h1 { font-size: clamp(3.7rem, 18vw, 5.7rem); }
    }
  </style>
</head>
<body>
  <main class="home">
    <div class="shell">
      <h1 id="heroTitle"></h1>
    </div>
  </main>

  <script>
    const content = __SITE_CONTENT__;
    const theme = content.theme || {};

    if (theme.accent) document.documentElement.style.setProperty("--accent", theme.accent);
    if (theme.paper) document.documentElement.style.setProperty("--paper", theme.paper);
    if (theme.ink) document.documentElement.style.setProperty("--ink", theme.ink);

    document.title = `Happy birthday, ${content.recipient || "my love"}`;
    document.getElementById("heroTitle").textContent =
      content.heroTitle || `Happy birthday ${content.recipient || "my love"}`;
  </script>
</body>
</html>
